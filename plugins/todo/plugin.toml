[plugin]
name = "todo"                          # namespace key: route/schema/table prefixes derive from it
version = "0.1.0"
description = "A to-do list resource (the first worked-example plugin)"
author = "app-starter"
host_api = "^1"                        # semver range against PLUGIN_API_VERSION, checked at startup
# The frontend lives under interface/src/plugins/todo/ (so it resolves the shared
# UI deps + typed client); path is repo-relative. The backend crate is here.
frontend = "interface/src/plugins/todo/plugin.tsx"
