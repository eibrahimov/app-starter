# Informational manifest. The runtime contract is the Rust `impl Plugin` in
# src/lib.rs (name/host_api/api/migrator); this file is NOT parsed at runtime, so
# keep its `name`/`host_api` in sync with the impl (the impl's values are what the
# host actually enforces).
[plugin]
name = "todo"                          # namespace key: route/schema/table prefixes derive from it
version = "0.1.0"
description = "A to-do list resource (the first worked-example plugin)"
author = "app-starter"
host_api = "^1"                        # semver range; host checks the impl's host_api() at startup
# The frontend lives under interface/src/plugins/todo/ (so it resolves the shared
# UI deps + typed client); path is repo-relative. The backend crate is here.
frontend = "interface/src/plugins/todo/plugin.tsx"
