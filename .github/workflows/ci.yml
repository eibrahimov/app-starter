name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      # Enforce the no-mod.rs convention: use <module>.rs + <module>/ instead.
      - name: Forbid mod.rs files
        run: |
          matches=$(git ls-files '*/mod.rs' 'mod.rs')
          if [ -n "$matches" ]; then
            echo "mod.rs files are not allowed; use <module>.rs + <module>/ instead:" >&2
            echo "$matches" >&2
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
        env:
          SKIP_FRONTEND_BUILD: "1"

      - name: cargo test
        run: cargo test
        env:
          SKIP_FRONTEND_BUILD: "1"

  typegen:
    name: Typegen drift
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@1.96.0

      - uses: Swatinem/rust-cache@v2

      - uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: cd interface && bun install --frozen-lockfile

      - name: Regenerate types and compare
        run: |
          cargo run --bin openapi_spec > /tmp/openapi.json
          (cd interface && bunx openapi-typescript /tmp/openapi.json -o src/api/schema.d.ts)
          git diff --exit-code -- interface/src/api/schema.d.ts
        env:
          SKIP_FRONTEND_BUILD: "1"

  frontend:
    name: Frontend
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: interface
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (Biome)
        run: bunx biome ci .

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

  a11y:
    name: A11y smoke (non-blocking)
    runs-on: ubuntu-24.04
    # Advisory only: a real-browser axe run shouldn't red-bar a merge, matching
    # the repo's report-don't-block stance (coverage is reported, never enforced).
    # Playwright's webServer boots `bun run dev` itself, so no backend is needed —
    # the spec mocks every /api call with populated fixtures.
    continue-on-error: true
    defaults:
      run:
        working-directory: interface
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Chromium
        run: bunx playwright install --with-deps chromium

      - name: A11y page smoke (axe)
        run: bun run a11y

  deny:
    name: cargo-deny
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - uses: EmbarkStudios/cargo-deny-action@v2

  registration:
    name: Plugin registration (release smoke)
    runs-on: ubuntu-24.04
    # The silent-plugin-loss risk is a release lto+strip phenomenon, so this guard
    # MUST run against a release artifact (docs/plugin-framework.md §6, [M1]).
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@1.96.0

      - uses: Swatinem/rust-cache@v2

      - name: Release-profile registration smoke check
        run: bash scripts/release-smoke.sh
        env:
          SKIP_FRONTEND_BUILD: "1"

  db:
    name: DB tooling
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      # scripts/db.sh needs the sqlite3 CLI; it ships on the ubuntu runner, but
      # install it defensively so this gate stays self-contained on any image.
      - name: Ensure sqlite3
        run: command -v sqlite3 >/dev/null || { sudo apt-get update && sudo apt-get install -y sqlite3; }

      # Equivalent to `just db-selftest`: the backup -> mutate -> restore -> check
      # round-trip plus the guard rails, all against a throwaway database.
      - name: DB helper smoke test
        run: bash scripts/db.test.sh
