name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Docker image
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches Cargo.toml version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version=$(grep -m1 '^version' Cargo.toml | cut -d '"' -f2)
          if [ "$tag" != "$version" ]; then
            echo "Tag v$tag does not match Cargo.toml version $version" >&2
            exit 1
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Attach an SLSA provenance attestation (unsigned build metadata) and
          # an SBOM to the image so downstream consumers can see how it was built
          # and what it contains. Pushed to GHCR alongside the image as OCI
          # referrers (needs packages: write; no id-token/cosign signing here).
          provenance: true
          sbom: true

  create-release:
    name: Create GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      # Create (or reuse) the release once, up front, so the per-OS binary jobs
      # below only upload assets to an existing release. Without this barrier,
      # the three matrix jobs can call action-gh-release concurrently for a tag
      # whose release does not exist yet and race to create it.
      - uses: softprops/action-gh-release@v2

  binaries:
    name: Binary (${{ matrix.os }})
    needs: create-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            asset: app-starter-linux-amd64.tar.gz
            bin: app-starter
          - os: macos-14
            asset: app-starter-macos-arm64.tar.gz
            bin: app-starter
          - os: windows-latest
            asset: app-starter-windows-amd64.zip
            bin: app-starter.exe
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Build the frontend so rust-embed bundles the UI into the binary.
      - name: Build frontend
        run: cd interface && bun install --frozen-lockfile && bun run build

      - name: Build release binary
        run: cargo build --release --bin app-starter
        env:
          SKIP_FRONTEND_BUILD: "1"

      # Package with each platform's native tool: tar on Unix, PowerShell's
      # Compress-Archive on Windows. The previous single `tar -a` step produced
      # a real .zip only because windows-latest ships bsdtar as `tar`; GNU tar
      # cannot write zips, so that assumption was fragile.
      - name: Package (tar.gz)
        if: runner.os != 'Windows'
        run: tar -czf "${{ matrix.asset }}" -C target/release "${{ matrix.bin }}"

      - name: Package (zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "target/release/${{ matrix.bin }}" -DestinationPath "${{ matrix.asset }}" -Force

      # Emit a SHA-256 sidecar next to each artifact so downstream consumers can
      # verify the download. `shasum -a 256` exists on both Linux and macOS
      # runners; Windows uses PowerShell's Get-FileHash. The "<hash>  <file>"
      # format matches shasum, so `shasum -c <asset>.sha256` verifies it.
      - name: Checksum (Unix)
        if: runner.os != 'Windows'
        run: shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"

      - name: Checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 "${{ matrix.asset }}").Hash.ToLower()
          "$hash  ${{ matrix.asset }}" | Out-File -Encoding ascii "${{ matrix.asset }}.sha256"

      - name: Attach to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256
