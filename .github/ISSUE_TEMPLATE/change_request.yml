name: Change request
description: Propose a change to the template's defaults, conventions, wiring, or release process
title: "change: "
labels: ["change-request"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for changes to the template itself — defaults, conventions, build/CI,
        release, or a reusable pattern — especially something learned while building a
        real app on top of App Starter. For a plain defect use the Bug report; for a
        brand-new capability use the Feature request.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What friction, gap, weak default, or risk did you hit, and where (file or step in the AGENTS.md recipe)?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed direction
      description: What should change, and how would it work for BOTH worked examples (items and posts), not just your app?
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Wiring / recipe (migration, domain, handler, typegen, UI)
        - Convention or docs (AGENTS.md, README)
        - Default — security / CORS / limits
        - Dependencies
        - Build / CI
        - Release / distribution
    validations:
      required: true
  - type: dropdown
    id: risk
    attributes:
      label: Risk level (be honest — it sets the path)
      options:
        - "Low: isolated, copies an existing pattern — a PR is welcome now"
        - "Medium: touches multiple layers — file this, then open a PR"
        - "High: changes a default, breaks the API contract, or sets direction — discuss here BEFORE a PR"
    validations:
      required: true
  - type: textarea
    id: origin
    attributes:
      label: Real-world origin (optional)
      description: If this came from an app built on the template, what happened? Keep it free of your app's domain code — port the pattern, not the feature.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: This is not specific to my app's domain; it improves the template for everyone.
          required: true
        - label: I have read the "Backporting from generated projects" section in CONTRIBUTING.md.
          required: true
