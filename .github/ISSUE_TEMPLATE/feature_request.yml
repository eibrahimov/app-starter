name: Feature or pattern proposal
description: Propose a template improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What does the template make hard, unsafe, repetitive, or unclear today?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence / real-world origin
      description: Fresh clone, generated app, repeated project, user report, or another concrete source.
  - type: textarea
    id: proposal
    attributes:
      label: Proposed direction
      description: Which layer changes, how it applies to both worked examples, and what users can delete if unused.
    validations:
      required: true
  - type: dropdown
    id: approval_area
    attributes:
      label: Does this touch an approval-required area?
      options:
        - No / routine pattern
        - Security, auth, CORS, request limits, or public exposure default
        - Dependencies, Rust toolchain, JS package manager, or framework version
        - Release workflow, Docker publishing, package identity, or binary names
        - Migration/data policy or destructive behavior
        - Generated-file policy or API contract policy
        - Architecture/conventions not represented by both examples
        - License policy or copied third-party code
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Simpler alternatives considered
      description: What smaller docs, workflow, or code change could solve most of the problem?
  - type: textarea
    id: validation_plan
    attributes:
      label: Validation plan
      description: Which commands, tests, or fresh-clone checks would prove this works?
